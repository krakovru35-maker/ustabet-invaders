<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Ustabet Invaders - Ses Test</title>

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at top, rgba(0, 149, 255, .32), transparent 35%),
        linear-gradient(180deg, #0b1f3d, #020611 75%);
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 18px;
    }

    .box {
      width: min(94vw, 520px);
      border: 1px solid rgba(120, 220, 255, .48);
      border-radius: 28px;
      padding: 26px;
      background: rgba(2, 8, 20, .88);
      box-shadow: 0 0 45px rgba(0, 140, 255, .28);
    }

    .logo {
      width: 64px;
      height: 64px;
      margin: 0 auto 14px;
      border-radius: 20px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #7ee7ff, #4d8cff);
      color: #03101f;
      font-size: 34px;
      font-weight: 900;
      box-shadow: 0 0 30px rgba(126, 231, 255, .58);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 30px;
      color: #7ee7ff;
      text-shadow: 0 0 20px rgba(126, 231, 255, .8);
    }

    p {
      margin: 0 0 18px;
      color: #cfe8ff;
      line-height: 1.45;
      font-size: 15px;
    }

    .status {
      margin: 14px 0;
      padding: 12px;
      border-radius: 16px;
      background: rgba(255, 255, 255, .07);
      color: #bfe3ff;
      font-size: 14px;
      min-height: 44px;
      display: grid;
      place-items: center;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    button {
      border: 0;
      border-radius: 16px;
      padding: 15px 12px;
      font-size: 15px;
      font-weight: 900;
      cursor: pointer;
      color: #03101f;
      background: linear-gradient(135deg, #5aa9ff, #8eeaff);
      box-shadow: 0 12px 24px rgba(89, 169, 255, .22);
    }

    button:active {
      transform: scale(.98);
    }

    .main {
      width: 100%;
      margin-bottom: 10px;
      background: linear-gradient(135deg, #ffe28a, #ffbd45);
    }

    .danger {
      background: linear-gradient(135deg, #ff7a7a, #ffbd45);
    }

    .note {
      margin-top: 14px;
      color: #7fa9d7;
      font-size: 12px;
      line-height: 1.4;
    }

    @media (max-width: 420px) {
      h1 {
        font-size: 25px;
      }

      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <div class="box">
    <div class="logo">B</div>

    <h1>Ustabet Invaders</h1>

    <p>
      Ses sistemi test modu. Burada kendi atari tarzı müziğimizi,
      silah sesini, patlama sesini ve ödül sesini deniyoruz.
    </p>

    <button class="main" onclick="enableAudio()">
      SESİ AKTİF ET
    </button>

    <div class="grid">
      <button onclick="toggleMusic()">MÜZİK BAŞLAT / DURDUR</button>
      <button onclick="soundShoot()">SİLAH SESİ</button>
      <button onclick="soundExplosion()" class="danger">PATLAMA</button>
      <button onclick="soundReward()">ÖDÜL SESİ</button>
    </div>

    <div id="status" class="status">
      Önce “Sesi Aktif Et” butonuna bas.
    </div>

    <div class="note">
      Not: Telegram ve mobil tarayıcılar sesi otomatik başlatmaz.
      Kullanıcı bir butona basınca ses açılır. Bu yüzden test ediyoruz.
    </div>
  </div>

  <script>
    let audioCtx = null;
    let audioEnabled = false;
    let musicTimer = null;
    let musicStep = 0;
    let musicPlaying = false;

    const statusEl = document.getElementById("status");

    function setStatus(text) {
      statusEl.textContent = text;
    }

    function enableAudio() {
      try {
        if (!audioCtx) {
          audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }

        if (audioCtx.state === "suspended") {
          audioCtx.resume();
        }

        audioEnabled = true;

        soundReward();
        setStatus("Ses aktif. Şimdi müzik ve efektleri test et.");

      } catch (e) {
        setStatus("Ses başlatılamadı: " + e.message);
      }
    }

    function playTone(freq, duration, type, volume) {
      if (!audioEnabled || !audioCtx) {
        setStatus("Önce Sesi Aktif Et butonuna bas.");
        return;
      }

      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();

      osc.type = type || "square";
      osc.frequency.setValueAtTime(freq, audioCtx.currentTime);

      gain.gain.setValueAtTime(volume || 0.04, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);

      osc.connect(gain);
      gain.connect(audioCtx.destination);

      osc.start();
      osc.stop(audioCtx.currentTime + duration);
    }

    function soundShoot() {
      playTone(880, 0.055, "square", 0.035);

      setTimeout(function() {
        playTone(1320, 0.035, "square", 0.025);
      }, 35);

      setStatus("Silah sesi test edildi.");
    }

    function soundExplosion() {
      playTone(170, 0.09, "sawtooth", 0.055);

      setTimeout(function() {
        playTone(90, 0.11, "square", 0.045);
      }, 60);

      setTimeout(function() {
        playTone(55, 0.14, "sawtooth", 0.035);
      }, 120);

      setStatus("Patlama sesi test edildi.");
    }

    function soundReward() {
      const notes = [523, 659, 784, 1046];

      notes.forEach(function(note, index) {
        setTimeout(function() {
          playTone(note, 0.09, "triangle", 0.045);
        }, index * 85);
      });

      setStatus("Ödül sesi test edildi.");
    }

    function toggleMusic() {
      if (!audioEnabled || !audioCtx) {
        setStatus("Önce Sesi Aktif Et butonuna bas.");
        return;
      }

      if (musicPlaying) {
        stopMusic();
        setStatus("Müzik durduruldu.");
      } else {
        startMusic();
        setStatus("Atari müziği başladı.");
      }
    }

    function startMusic() {
      stopMusic();

      musicPlaying = true;
      musicStep = 0;

      const melody = [
        196, 196, 247, 196,
        294, 247, 196, 165,
        196, 247, 330, 294,
        247, 196, 165, 147
      ];

      musicTimer = setInterval(function() {
        const note = melody[musicStep % melody.length];
        const bass = note / 2;

        playTone(bass, 0.08, "square", 0.018);

        if (musicStep % 2 === 0) {
          playTone(note, 0.06, "triangle", 0.018);
        }

        musicStep++;
      }, 180);
    }

    function stopMusic() {
      if (musicTimer) {
        clearInterval(musicTimer);
        musicTimer = null;
      }

      musicPlaying = false;
    }

    window.addEventListener("beforeunload", function() {
      stopMusic();
    });
  </script>
</body>
</html>
