<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Canvas Hareket Testi</title>

<style>
  html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    background: #050816;
    overflow: hidden;
    color: white;
    font-family: Arial, sans-serif;
  }

  .wrap {
    width: 100vw;
    height: 100vh;
    display: grid;
    place-items: center;
  }

  canvas {
    width: 90vw;
    max-width: 420px;
    height: auto;
    background: #020617;
    border: 2px solid #38bdf8;
    border-radius: 18px;
    transform: translateZ(0);
    will-change: transform;
  }

  #info {
    position: fixed;
    top: 10px;
    left: 10px;
    right: 10px;
    padding: 10px;
    border-radius: 12px;
    background: rgba(0,0,0,.55);
    font-size: 13px;
    z-index: 10;
  }
</style>
</head>

<body>
  <div id="info">Test başlıyor...</div>

  <div class="wrap">
    <canvas id="game" width="400" height="400"></canvas>
  </div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const info = document.getElementById("info");

let x = 40;
let y = 200;
let vx = 2.5;
let frame = 0;

function draw() {
  frame++;

  x += vx;

  if (x > 360 || x < 40) {
    vx *= -1;
  }

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = "#020617";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = "#22c55e";
  ctx.beginPath();
  ctx.arc(x, y, 24, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = "#ffffff";
  ctx.font = "bold 22px Arial";
  ctx.fillText("Frame: " + frame, 20, 40);
  ctx.fillText("X: " + Math.round(x), 20, 70);

  info.textContent = "Frame: " + frame + " | X: " + Math.round(x) + " | Eğer yeşil top hareket etmiyorsa sorun oyun değil, canvas repaint.";

  requestAnimationFrame(draw);
}

draw();
</script>
</body>
</html>
