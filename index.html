<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Marino Maze</title>

  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />

  <script>
    (function () {
      const GAME_VERSION = "maze-010-grid-fixed";
      const url = new URL(window.location.href);

      if (url.searchParams.get("v") !== GAME_VERSION) {
        url.searchParams.set("v", GAME_VERSION);
        url.searchParams.set("_cb", Date.now().toString());
        window.location.replace(url.toString());
        return;
      }

      if ("caches" in window) {
        caches.keys().then(keys => {
          keys.forEach(k => caches.delete(k));
        }).catch(() => {});
      }

      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.getRegistrations()
          .then(regs => regs.forEach(r => r.unregister()))
          .catch(() => {});
      }
    })();
  </script>

  <style>
    * {
      box-sizing: border-box;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      background:
        radial-gradient(circle at top, rgba(39, 142, 255, 0.34), transparent 38%),
        radial-gradient(circle at bottom, rgba(0, 255, 220, 0.10), transparent 35%),
        linear-gradient(180deg, #071a3d 0%, #020711 78%);
      font-family: Arial, sans-serif;
      color: #ffffff;
      overflow-x: hidden;
    }

    body {
      display: flex;
      justify-content: center;
      padding: 8px;
    }

    .app {
      width: min(96vw, 520px);
    }

    .top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 8px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .logo {
      width: 44px;
      height: 44px;
      border-radius: 15px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #82edff, #347cff);
      color: #03101f;
      font-size: 25px;
      font-weight: 900;
      box-shadow: 0 0 24px rgba(97, 205, 255, 0.55);
      flex: 0 0 auto;
    }

    h1 {
      margin: 0;
      font-size: 22px;
      line-height: 1.05;
      white-space: nowrap;
    }

    .sub {
      margin-top: 3px;
      color: #9ed7ff;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .pill {
      border: 1px solid rgba(126, 231, 255, 0.6);
      border-radius: 999px;
      padding: 8px 10px;
      background: rgba(0, 25, 55, 0.55);
      color: #dff7ff;
      font-size: 11px;
      font-weight: 900;
      white-space: nowrap;
      box-shadow: 0 0 20px rgba(126, 231, 255, 0.12);
    }

    .panel {
      border: 1px solid rgba(67, 166, 255, 0.58);
      border-radius: 22px;
      padding: 10px;
      background: rgba(0, 9, 25, 0.78);
      box-shadow: 0 0 45px rgba(0, 132, 255, 0.22);
      overflow: hidden;
    }

    .hud {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 7px;
      margin-bottom: 9px;
    }

    .stat {
      min-height: 51px;
      border: 1px solid rgba(118, 175, 255, 0.30);
      border-radius: 14px;
      padding: 8px;
      background: rgba(255, 255, 255, 0.075);
    }

    .stat b {
      display: block;
      color: #9ed7ff;
      font-size: 9px;
      margin-bottom: 6px;
      letter-spacing: 0.4px;
    }

    .stat span {
      font-size: 17px;
      font-weight: 900;
    }

    .gameWrap {
      position: relative;
      width: 100%;
      border-radius: 18px;
      overflow: hidden;
      border: 1px solid rgba(42, 184, 255, 0.58);
      background: #010711;
    }

    canvas {
      display: block;
      width: 100%;
      height: auto;
      background: #010711;
      touch-action: none;
    }

    .startScreen {
      position: absolute;
      inset: 0;
      z-index: 30;
      display: grid;
      place-items: center;
      padding: 15px;
      background:
        radial-gradient(circle at center, rgba(45, 145, 255, 0.20), rgba(0, 0, 0, 0.88) 72%),
        rgba(0, 0, 0, 0.74);
    }

    .startBox {
      width: min(94%, 390px);
      text-align: center;
      border: 1px solid rgba(126, 231, 255, 0.42);
      border-radius: 22px;
      padding: 18px;
      background: rgba(2, 10, 25, 0.96);
      box-shadow: 0 0 36px rgba(0, 140, 255, 0.24);
    }

    .startBox h2 {
      margin: 0 0 8px;
      color: #7ee7ff;
      font-size: 30px;
      text-shadow: 0 0 20px rgba(126, 231, 255, 0.75);
    }

    .startBox p {
      margin: 0 0 13px;
      color: #cfe8ff;
      font-size: 13px;
      line-height: 1.45;
    }

    input {
      width: 100%;
      height: 46px;
      border-radius: 14px;
      border: 1px solid rgba(126, 231, 255, 0.35);
      outline: none;
      padding: 0 14px;
      background: rgba(255, 255, 255, 0.08);
      color: #ffffff;
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 10px;
    }

    input::placeholder {
      color: #8aa9c8;
    }

    button {
      border: 0;
      cursor: pointer;
      border-radius: 16px;
      font-weight: 900;
      color: #03101f;
      background: linear-gradient(135deg, #ffe99b, #ffbf43);
      box-shadow: 0 12px 22px rgba(255, 191, 67, 0.22);
    }

    button:active {
      transform: scale(0.98);
    }

    .startBtn {
      width: 100%;
      height: 50px;
      font-size: 16px;
    }

    .controls {
      margin-top: 9px;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      grid-template-areas:
        ". up ."
        "left mid right"
        ". down .";
      gap: 7px;
      max-width: 250px;
      margin-left: auto;
      margin-right: auto;
    }

    .ctrl {
      height: 45px;
      color: #dff7ff;
      font-size: 19px;
      background: rgba(0, 40, 82, 0.78);
      border: 1px solid rgba(65, 178, 255, 0.5);
      box-shadow: none;
    }

    .up { grid-area: up; }
    .left { grid-area: left; }
    .right { grid-area: right; }
    .down { grid-area: down; }

    .mid {
      grid-area: mid;
      background: rgba(126, 231, 255, 0.12);
      color: #7ee7ff;
    }

    .message {
      min-height: 42px;
      border-radius: 14px;
      padding: 10px 11px;
      margin-top: 9px;
      background: rgba(255, 255, 255, 0.08);
      color: #cfe8ff;
      font-size: 12px;
      line-height: 1.35;
    }

    .rewardList {
      margin-top: 8px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .rewardTag {
      border-radius: 999px;
      padding: 6px 10px;
      background: rgba(126, 231, 255, 0.12);
      border: 1px solid rgba(126, 231, 255, 0.35);
      color: #dff7ff;
      font-size: 12px;
      font-weight: 900;
    }

    @media (max-width: 430px) {
      body {
        padding: 6px;
      }

      .app {
        width: 100%;
      }

      .logo {
        width: 40px;
        height: 40px;
        font-size: 22px;
      }

      h1 {
        font-size: 19px;
      }

      .sub {
        font-size: 11px;
      }

      .pill {
        font-size: 10px;
        padding: 7px 8px;
      }

      .panel {
        padding: 8px;
      }

      .hud {
        gap: 5px;
      }

      .stat {
        min-height: 47px;
        padding: 7px;
      }

      .stat span {
        font-size: 15px;
      }

      .controls {
        max-width: 230px;
      }

      .ctrl {
        height: 43px;
      }
    }
  </style>
</head>

<body>
  <div class="app">
    <div class="top">
      <div class="brand">
        <div class="logo">M</div>
        <div>
          <h1>Marino Maze</h1>
          <div class="sub">Nostaljik labirent ödül avı</div>
        </div>
      </div>
      <div class="pill">FS / FB AVCISI</div>
    </div>

    <div class="panel">
      <div class="hud">
        <div class="stat">
          <b>SKOR</b>
          <span id="score">0</span>
        </div>

        <div class="stat">
          <b>CAN</b>
          <span id="lives">3</span>
        </div>

        <div class="stat">
          <b>LEVEL</b>
          <span id="level">1</span>
        </div>

        <div class="stat">
          <b>ÖDÜL</b>
          <span id="rewardCount">0</span>
        </div>
      </div>

      <div class="gameWrap">
        <canvas id="game" width="456" height="504"></canvas>

        <div id="startScreen" class="startScreen">
          <div class="startBox">
            <h2>Marino Maze</h2>
            <p>
              Noktaları topla. Mavi kapsülü alınca hayaletleri yakala.
              Hayaletlerden nadiren FS / FB ödül kapsülü düşer.
            </p>

            <input id="siteUsername" type="text" placeholder="Site kullanıcı adını yaz" />

            <button id="startBtn" class="startBtn">
              OYUNU BAŞLAT
            </button>
          </div>
        </div>
      </div>

      <div class="controls">
        <button class="ctrl up" id="upBtn">▲</button>
        <button class="ctrl left" id="leftBtn">◀</button>
        <button class="ctrl mid" id="midBtn">●</button>
        <button class="ctrl right" id="rightBtn">▶</button>
        <button class="ctrl down" id="downBtn">▼</button>
      </div>

      <div id="message" class="message">
        Hazır. Başlat butonuna bas. 3 saniye geri sayımdan sonra oyun başlayacak.
      </div>

      <div id="rewardList" class="rewardList"></div>
    </div>
  </div>

  <script>
    const CONFIG = {
      SHEETS_WEBAPP_URL: "",
      GAME_NAME: "Marino Maze",
      GAME_VERSION: "maze-010-grid-fixed"
    };

    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");

    const scoreEl = document.getElementById("score");
    const livesEl = document.getElementById("lives");
    const levelEl = document.getElementById("level");
    const rewardCountEl = document.getElementById("rewardCount");
    const messageEl = document.getElementById("message");
    const rewardListEl = document.getElementById("rewardList");
    const startScreen = document.getElementById("startScreen");
    const startBtn = document.getElementById("startBtn");

    const CELL = 24;
    const COLS = 19;
    const ROWS = 21;
    const W = canvas.width;
    const H = canvas.height;

    const maze = [
      "1111111111111111111",
      "1000000001000000001",
      "1011011101011101101",
      "1P100000000000001P1",
      "1011010111110101101",
      "1000010001000100001",
      "1111011101011101111",
      "1000000000000000001",
      "1011110111110111101",
      "1000000100010000001",
      "1111100100010011111",
      "1000000100010000001",
      "1011110111110111101",
      "1000000000000000001",
      "1111011101011101111",
      "1000010001000100001",
      "1011010111110101101",
      "1P100000000000001P1",
      "1011011101011101101",
      "1000000001000000001",
      "1111111111111111111"
    ];

    const DIRS = {
      none: { x: 0, y: 0, name: "none" },
      up: { x: 0, y: -1, name: "up" },
      down: { x: 0, y: 1, name: "down" },
      left: { x: -1, y: 0, name: "left" },
      right: { x: 1, y: 0, name: "right" }
    };

    let state = "idle";
    let lastTime = performance.now();
    let countdownText = "";
    let countdownActive = false;

    let username = "test_user";
    let sessionId = "";
    let gameStartedAt = 0;

    let score = 0;
    let lives = 3;
    let level = 1;

    let player;
    let ghosts = [];
    let pelletGrid = [];
    let powerModeUntil = 0;
    let rewardDrops = [];
    let rewardsCaught = [];
    let particles = [];

    let audioCtx = null;
    let audioEnabled = false;
    let musicTimer = null;
    let musicStep = 0;

    let swipeStartX = 0;
    let swipeStartY = 0;
    let swipeActive = false;

    function setMessage(text) {
      messageEl.textContent = text;
    }

    function updateHud() {
      scoreEl.textContent = score;
      livesEl.textContent = lives;
      levelEl.textContent = level;
      rewardCountEl.textContent = rewardsCaught.length;
    }

    function centerOf(col, row) {
      return {
        x: col * CELL + CELL / 2,
        y: row * CELL + CELL / 2
      };
    }

    function getCellFromPixel(x, y) {
      return {
        col: Math.floor(x / CELL),
        row: Math.floor(y / CELL)
      };
    }

    function isWallCell(col, row) {
      if (col < 0 || row < 0 || col >= COLS || row >= ROWS) return true;
      return maze[row][col] === "1";
    }

    function nearestCenter(entity) {
      const col = Math.round((entity.x - CELL / 2) / CELL);
      const row = Math.round((entity.y - CELL / 2) / CELL);

      return {
        col,
        row,
        x: col * CELL + CELL / 2,
        y: row * CELL + CELL / 2
      };
    }

    function nearCenter(entity, threshold = 6) {
      const c = nearestCenter(entity);
      return Math.abs(entity.x - c.x) <= threshold && Math.abs(entity.y - c.y) <= threshold;
    }

    function snapCenter(entity) {
      const c = nearestCenter(entity);
      entity.x = c.x;
      entity.y = c.y;
    }

    function canMoveFromCenter(entity, dir) {
      if (!dir || dir.name === "none") return false;

      const c = nearestCenter(entity);
      return !isWallCell(c.col + dir.x, c.row + dir.y);
    }

    function getLegalDirections(entity) {
      return [DIRS.up, DIRS.down, DIRS.left, DIRS.right].filter(dir => {
        return canMoveFromCenter(entity, dir);
      });
    }

    function opposite(dir) {
      if (!dir) return DIRS.none;
      if (dir.name === "up") return DIRS.down;
      if (dir.name === "down") return DIRS.up;
      if (dir.name === "left") return DIRS.right;
      if (dir.name === "right") return DIRS.left;
      return DIRS.none;
    }

    function resetPellets() {
      pelletGrid = [];

      for (let r = 0; r < ROWS; r++) {
        pelletGrid[r] = [];

        for (let c = 0; c < COLS; c++) {
          const ch = maze[r][c];

          if (ch === "0") {
            pelletGrid[r][c] = "dot";
          } else if (ch === "P") {
            pelletGrid[r][c] = "power";
          } else {
            pelletGrid[r][c] = null;
          }
        }
      }
    }

    function remainingPellets() {
      let count = 0;

      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          if (pelletGrid[r][c]) count++;
        }
      }

      return count;
    }

    function unlockAudio() {
      try {
        if (!audioCtx) {
          audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }

        if (audioCtx.state === "suspended") {
          audioCtx.resume();
        }

        audioEnabled = true;
      } catch (e) {
        audioEnabled = false;
      }
    }

    function playTone(freq, duration, type = "square", volume = 0.025) {
      if (!audioEnabled || !audioCtx) return;

      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();

      osc.type = type;
      osc.frequency.setValueAtTime(freq, audioCtx.currentTime);

      gain.gain.setValueAtTime(volume, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);

      osc.connect(gain);
      gain.connect(audioCtx.destination);

      osc.start();
      osc.stop(audioCtx.currentTime + duration);
    }

    function soundCountdown() {
      playTone(620, 0.07, "square", 0.035);
    }

    function soundStart() {
      playTone(520, 0.08, "square", 0.035);
      setTimeout(() => playTone(780, 0.09, "square", 0.035), 90);
      setTimeout(() => playTone(1040, 0.11, "square", 0.035), 180);
    }

    function soundDot() {
      playTone(650, 0.035, "square", 0.012);
    }

    function soundPower() {
      [330, 440, 660, 880, 990].forEach((n, i) => {
        setTimeout(() => playTone(n, 0.065, "triangle", 0.035), i * 55);
      });
    }

    function soundGhostEat() {
      [220, 330, 440, 660].forEach((n, i) => {
        setTimeout(() => playTone(n, 0.07, "square", 0.035), i * 65);
      });
    }

    function soundRewardDrop() {
      playTone(740, 0.08, "triangle", 0.04);
      setTimeout(() => playTone(980, 0.08, "triangle", 0.04), 90);
    }

    function soundRewardCatch() {
      [523, 659, 784, 988, 1174].forEach((n, i) => {
        setTimeout(() => playTone(n, 0.085, "square", 0.043), i * 75);
      });
    }

    function soundDamage() {
      playTone(150, 0.12, "sawtooth", 0.05);
      setTimeout(() => playTone(80, 0.15, "sawtooth", 0.04), 80);
    }

    function soundGameOver() {
      [392, 294, 220, 146].forEach((n, i) => {
        setTimeout(() => playTone(n, 0.17, "square", 0.043), i * 160);
      });
    }

    function startMusic() {
      stopMusic();

      const motif = [
        { n: 392, g: 95 },
        { n: 523, g: 95 },
        { n: 659, g: 95 },
        { n: 784, g: 140 },
        { n: 659, g: 95 },
        { n: 523, g: 95 },
        { n: 440, g: 95 },
        { n: 523, g: 155 },
        { n: 330, g: 95 },
        { n: 392, g: 95 },
        { n: 494, g: 95 },
        { n: 587, g: 140 },
        { n: 494, g: 95 },
        { n: 392, g: 95 },
        { n: 330, g: 95 },
        { n: 262, g: 190 }
      ];

      musicStep = 0;

      function musicLoop() {
        if (!musicTimer) return;

        if (state !== "playing") {
          musicTimer = setTimeout(musicLoop, 250);
          return;
        }

        const item = motif[musicStep % motif.length];

        playTone(item.n, 0.055, "square", 0.009);
        playTone(item.n / 2, 0.075, "triangle", 0.005);

        if (powerModeUntil > Date.now()) {
          playTone(item.n * 1.5, 0.045, "triangle", 0.007);
        }

        if (musicStep % 8 === 0) {
          playTone(98, 0.08, "square", 0.008);
        }

        musicStep++;
        musicTimer = setTimeout(musicLoop, item.g);
      }

      musicTimer = setTimeout(musicLoop, 120);
    }

    function stopMusic() {
      if (musicTimer) {
        clearTimeout(musicTimer);
        musicTimer = null;
      }
    }

    function resetPositions() {
      const p = centerOf(9, 17);

      player = {
        x: p.x,
        y: p.y,
        r: 8,
        speed: 2.05 + level * 0.03,
        dir: DIRS.none,
        nextDir: DIRS.none,
        mouth: 0
      };

      const spawn = [
        { c: 9, r: 9, color: "#ff5c8a", name: "red" },
        { c: 8, r: 11, color: "#60e7ff", name: "cyan" },
        { c: 10, r: 11, color: "#ffb84a", name: "orange" },
        { c: 9, r: 11, color: "#b06cff", name: "purple" }
      ];

      ghosts = spawn.map((g) => {
        const pos = centerOf(g.c, g.r);

        return {
          x: pos.x,
          y: pos.y,
          startX: pos.x,
          startY: pos.y,
          r: 8,
          color: g.color,
          name: g.name,
          dir: DIRS.none,
          speed: 1.12 + level * 0.045,
          eatenCooldown: 0
        };
      });
    }

    function prepareNewGame() {
      username = document.getElementById("siteUsername").value.trim() || "test_user";
      sessionId = "MM-" + Date.now() + "-" + Math.floor(Math.random() * 999999);
      gameStartedAt = Date.now();

      score = 0;
      lives = 3;
      level = 1;
      powerModeUntil = 0;
      rewardDrops = [];
      rewardsCaught = [];
      particles = [];
      rewardListEl.innerHTML = "";

      resetPellets();
      resetPositions();
      updateHud();

      recordEvent("GAME_START", {
        username,
        sessionId
      });
    }

    function startCountdown() {
      if (countdownActive) return;

      unlockAudio();
      prepareNewGame();

      state = "countdown";
      countdownActive = true;
      startScreen.style.display = "none";
      setMessage("Hazırlan. Oyun 3 saniye içinde başlayacak.");

      let count = 3;
      countdownText = String(count);
      soundCountdown();

      const timer = setInterval(() => {
        count--;

        if (count > 0) {
          countdownText = String(count);
          soundCountdown();
          setMessage("Başlıyor: " + count);
        } else if (count === 0) {
          countdownText = "BAŞLA!";
          soundStart();
          setMessage("Başla!");
        } else {
          clearInterval(timer);

          countdownText = "";
          countdownActive = false;

          player.dir = DIRS.none;
          player.nextDir = DIRS.none;

          ghosts.forEach(g => {
            g.dir = chooseGhostDirection(g, false);
          });

          lastTime = performance.now();
          state = "playing";

          startMusic();
          setMessage("Oyun başladı. İlk yönünü seç: mobilde kaydır, bilgisayarda ok tuşlarını kullan.");
        }
      }, 1000);
    }

    function loop(now) {
      const dt = Math.min(2, (now - lastTime) / 16.67);
      lastTime = now;

      if (state === "playing") {
        updateGame(dt);
      } else {
        updateParticles(dt);
      }

      draw();
      requestAnimationFrame(loop);
    }

    function updateGame(dt) {
      updatePlayer(dt);
      updateGhosts(dt);
      collectPellets();
      updateRewards(dt);
      updateParticles(dt);
      checkGhostCollision();
      checkRewardCollision();

      if (remainingPellets() <= 0) {
        nextLevel();
      }

      updateHud();
    }

    function updatePlayer(dt) {
      if (!player) return;

      if (nearCenter(player, 6)) {
        snapCenter(player);

        if (player.nextDir.name !== "none" && canMoveFromCenter(player, player.nextDir)) {
          player.dir = player.nextDir;
        }

        if (player.dir.name !== "none" && !canMoveFromCenter(player, player.dir)) {
          player.dir = DIRS.none;
        }
      }

      if (player.dir.name !== "none") {
        player.x += player.dir.x * player.speed * dt;
        player.y += player.dir.y * player.speed * dt;
      }

      player.mouth += 0.18 * dt;
    }

    function updateGhosts(dt) {
      const vulnerable = powerModeUntil > Date.now();

      for (const g of ghosts) {
        if (g.eatenCooldown > 0) {
          g.eatenCooldown -= 16.67 * dt;

          const dx = g.startX - g.x;
          const dy = g.startY - g.y;
          const dist = Math.hypot(dx, dy);

          if (dist > 2) {
            g.x += (dx / dist) * 2.25 * dt;
            g.y += (dy / dist) * 2.25 * dt;
          } else {
            g.x = g.startX;
            g.y = g.startY;
            g.eatenCooldown = 0;
            snapCenter(g);
            g.dir = chooseGhostDirection(g, vulnerable);
          }

          continue;
        }

        if (nearCenter(g, 6)) {
          snapCenter(g);

          if (g.dir.name === "none" || !canMoveFromCenter(g, g.dir) || Math.random() < 0.28) {
            g.dir = chooseGhostDirection(g, vulnerable);
          }

          if (g.dir.name !== "none" && !canMoveFromCenter(g, g.dir)) {
            g.dir = DIRS.none;
          }
        }

        if (g.dir.name !== "none") {
          const speed = vulnerable ? 0.95 + level * 0.02 : g.speed;

          g.x += g.dir.x * speed * dt;
          g.y += g.dir.y * speed * dt;
        }
      }
    }

    function chooseGhostDirection(g, vulnerable) {
      let options = getLegalDirections(g);

      if (!options.length) {
        return DIRS.none;
      }

      const reverse = opposite(g.dir);

      if (options.length > 1 && reverse.name !== "none") {
        options = options.filter(dir => dir.name !== reverse.name);
      }

      if (!options.length) {
        options = getLegalDirections(g);
      }

      if (Math.random() < 0.22) {
        return options[Math.floor(Math.random() * options.length)];
      }

      options.sort((a, b) => {
        const ax = g.x + a.x * CELL;
        const ay = g.y + a.y * CELL;

        const bx = g.x + b.x * CELL;
        const by = g.y + b.y * CELL;

        const da = Math.hypot(ax - player.x, ay - player.y);
        const db = Math.hypot(bx - player.x, by - player.y);

        return vulnerable ? db - da : da - db;
      });

      return options[0];
    }

    function collectPellets() {
      const cell = getCellFromPixel(player.x, player.y);

      if (cell.row < 0 || cell.row >= ROWS || cell.col < 0 || cell.col >= COLS) {
        return;
      }

      const item = pelletGrid[cell.row] && pelletGrid[cell.row][cell.col];

      if (!item) return;

      pelletGrid[cell.row][cell.col] = null;

      if (item === "dot") {
        score += 10;
        soundDot();
      }

      if (item === "power") {
        score += 80;
        powerModeUntil = Date.now() + Math.max(5000, 8200 - level * 450);
        soundPower();
        setMessage("Güç modu aktif! Hayaletleri yakala, nadir ödül kapsülü düşebilir.");
      }
    }

    function checkGhostCollision() {
      const vulnerable = powerModeUntil > Date.now();

      for (const g of ghosts) {
        if (g.eatenCooldown > 0) continue;

        const dist = Math.hypot(g.x - player.x, g.y - player.y);

        if (dist < player.r + g.r - 2) {
          if (vulnerable) {
            score += 220;
            g.eatenCooldown = 1800;
            explode(g.x, g.y, "#7ee7ff");
            soundGhostEat();
            maybeDropReward(g);
          } else {
            loseLife();
            return;
          }
        }
      }
    }

    function maybeDropReward(g) {
      if (rewardsCaught.length >= 1) return;
      if (rewardDrops.length >= 1) return;

      const chance = 0.13;

      if (Math.random() > chance) {
        setMessage("Hayalet yakalandı ama ödül düşmedi. Devam.");
        return;
      }

      const type = Math.random() < 0.45 ? "FREEBET" : "FREESPIN";
      let amount;

      if (type === "FREESPIN") {
        amount = [10, 20, 25, 50][Math.floor(Math.random() * 4)];
      } else {
        amount = [25, 50, 100][Math.floor(Math.random() * 3)];
      }

      const label = amount + " " + type;

      rewardDrops.push({
        id: "DROP-" + Date.now(),
        x: g.x,
        y: g.y,
        r: 14,
        type,
        amount,
        label,
        ttl: 8500,
        spin: 0
      });

      soundRewardDrop();
      setMessage("Ödül kapsülü düştü: " + label + ". Kaybolmadan yakala!");
    }

    function updateRewards(dt) {
      for (const r of rewardDrops) {
        r.ttl -= 16.67 * dt;
        r.spin += 0.1 * dt;

        if (r.ttl <= 0) {
          r.dead = true;
          setMessage(r.label + " ödülü kaçtı. Yakalanmayan ödül sayılmaz.");
        }
      }

      rewardDrops = rewardDrops.filter(r => !r.dead);
    }

    function checkRewardCollision() {
      for (const r of rewardDrops) {
        const dist = Math.hypot(r.x - player.x, r.y - player.y);

        if (dist < r.r + player.r) {
          r.dead = true;

          const rewardData = {
            type: r.type,
            amount: r.amount,
            label: r.label,
            username,
            sessionId,
            score,
            level,
            time: new Date().toISOString(),
            status: "PENDING"
          };

          rewardsCaught.push(rewardData);

          score += 500;
          soundRewardCatch();
          explode(r.x, r.y, "#ffe28a");

          const tag = document.createElement("div");
          tag.className = "rewardTag";
          tag.textContent = r.label;
          rewardListEl.appendChild(tag);

          recordEvent("REWARD_CAUGHT", rewardData);

          setMessage("Ödül yakalandı: " + r.label + ". Kayıt durumu: PENDING.");
        }
      }

      rewardDrops = rewardDrops.filter(r => !r.dead);
    }

    function loseLife() {
      lives--;
      soundDamage();
      explode(player.x, player.y, "#ff7070");

      if (lives <= 0) {
        endGame("Can bitti. Oyun bitti.");
        return;
      }

      setMessage("Hayalete yakalandın. Kalan can: " + lives);
      powerModeUntil = 0;
      resetPositions();

      ghosts.forEach(g => {
        g.dir = chooseGhostDirection(g, false);
      });
    }

    function nextLevel() {
      level++;
      score += 700;
      powerModeUntil = 0;
      rewardDrops = [];
      resetPellets();
      resetPositions();

      ghosts.forEach(g => {
        g.dir = chooseGhostDirection(g, false);
      });

      setMessage("Labirent temizlendi. Yeni level başladı.");
    }

    function endGame(text) {
      state = "gameover";
      stopMusic();
      soundGameOver();
      updateHud();

      recordEvent("GAME_END", {
        username,
        sessionId,
        score,
        level,
        lives,
        rewards: rewardsCaught,
        durationSeconds: Math.round((Date.now() - gameStartedAt) / 1000)
      });

      setMessage(text + " Skor: " + score + ". Tekrar oynamak için sayfayı yenile.");
    }

    function explode(x, y, color) {
      for (let i = 0; i < 18; i++) {
        particles.push({
          x,
          y,
          vx: (Math.random() - 0.5) * 5,
          vy: (Math.random() - 0.5) * 5,
          life: 1,
          color
        });
      }
    }

    function updateParticles(dt) {
      for (const p of particles) {
        p.x += p.vx * dt;
        p.y += p.vy * dt;
        p.life -= 0.026 * dt;
      }

      particles = particles.filter(p => p.life > 0);
    }

    function draw() {
      ctx.clearRect(0, 0, W, H);

      drawBackground();
      drawMaze();
      drawPellets();
      drawRewards();
      drawGhosts();
      drawPlayer();
      drawParticles();

      if (state === "countdown") {
        drawCountdown();
      }

      if (state === "gameover") {
        drawGameOver();
      }
    }

    function drawBackground() {
      const g = ctx.createLinearGradient(0, 0, 0, H);
      g.addColorStop(0, "#020a18");
      g.addColorStop(1, "#00040b");

      ctx.fillStyle = g;
      ctx.fillRect(0, 0, W, H);

      ctx.fillStyle = "rgba(255,255,255,0.32)";

      for (let i = 0; i < 60; i++) {
        const x = (i * 71 + Date.now() * 0.012) % W;
        const y = (i * 47 + Date.now() * 0.016) % H;
        ctx.fillRect(x, y, 1.05, 1.05);
      }
    }

    function drawMaze() {
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          if (maze[r][c] !== "1") continue;

          const x = c * CELL;
          const y = r * CELL;

          ctx.save();
          ctx.shadowColor = "#1ca8ff";
          ctx.shadowBlur = 9;
          ctx.fillStyle = "rgba(23, 89, 190, 0.58)";
          roundRect(x + 2, y + 2, CELL - 4, CELL - 4, 7);
          ctx.fill();

          ctx.shadowBlur = 0;
          ctx.strokeStyle = "rgba(126, 231, 255, 0.32)";
          ctx.lineWidth = 1;
          roundRect(x + 2.5, y + 2.5, CELL - 5, CELL - 5, 7);
          ctx.stroke();
          ctx.restore();
        }
      }
    }

    function drawPellets() {
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          const item = pelletGrid[r][c];
          if (!item) continue;

          const x = c * CELL + CELL / 2;
          const y = r * CELL + CELL / 2;

          ctx.save();

          if (item === "dot") {
            ctx.fillStyle = "rgba(255, 230, 150, 0.9)";
            ctx.shadowColor = "#ffe28a";
            ctx.shadowBlur = 7;
            ctx.beginPath();
            ctx.arc(x, y, 2.5, 0, Math.PI * 2);
            ctx.fill();
          }

          if (item === "power") {
            const pulse = 1.8 + Math.sin(Date.now() / 120) * 1.4;

            ctx.fillStyle = "#7ee7ff";
            ctx.shadowColor = "#7ee7ff";
            ctx.shadowBlur = 18;
            ctx.beginPath();
            ctx.arc(x, y, 7 + pulse, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = "#03101f";
            ctx.font = "900 9px Arial";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText("M", x, y + 1);
          }

          ctx.restore();
        }
      }
    }

    function drawPlayer() {
      if (!player) return;

      const mouthOpen = 0.22 + Math.abs(Math.sin(player.mouth)) * 0.28;
      let angle = 0;

      if (player.dir.name === "right") angle = 0;
      if (player.dir.name === "down") angle = Math.PI / 2;
      if (player.dir.name === "left") angle = Math.PI;
      if (player.dir.name === "up") angle = -Math.PI / 2;

      ctx.save();
      ctx.translate(player.x, player.y);
      ctx.rotate(angle);

      ctx.shadowColor = "#ffe28a";
      ctx.shadowBlur = 16;
      ctx.fillStyle = "#ffcf4a";

      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.arc(0, 0, player.r + 2, mouthOpen, Math.PI * 2 - mouthOpen);
      ctx.closePath();
      ctx.fill();

      ctx.shadowBlur = 0;
      ctx.fillStyle = "#03101f";
      ctx.font = "900 8px Arial";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.rotate(-angle);
      ctx.fillText("M", 0, 1);

      ctx.restore();
    }

    function drawGhosts() {
      const vulnerable = powerModeUntil > Date.now();

      for (const g of ghosts) {
        if (g.eatenCooldown > 0) {
          ctx.save();
          ctx.globalAlpha = 0.35;
          ctx.fillStyle = "#ffffff";
          ctx.beginPath();
          ctx.arc(g.x, g.y, 4.5, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
          continue;
        }

        ctx.save();

        const color = vulnerable ? "#2f74ff" : g.color;
        const pulse = Math.sin(Date.now() / 120 + g.x) * 1.2;

        ctx.translate(g.x, g.y + pulse);

        ctx.shadowColor = color;
        ctx.shadowBlur = vulnerable ? 22 : 15;
        ctx.fillStyle = color;

        ctx.beginPath();
        ctx.arc(0, -2, g.r + 2, Math.PI, 0);
        ctx.lineTo(g.r + 2, g.r + 4);
        ctx.lineTo(g.r / 2, g.r);
        ctx.lineTo(0, g.r + 4);
        ctx.lineTo(-g.r / 2, g.r);
        ctx.lineTo(-g.r - 2, g.r + 4);
        ctx.closePath();
        ctx.fill();

        ctx.shadowBlur = 0;
        ctx.fillStyle = "#ffffff";
        ctx.beginPath();
        ctx.arc(-3.5, -3, 2.6, 0, Math.PI * 2);
        ctx.arc(4.5, -3, 2.6, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = "#03101f";
        ctx.beginPath();
        ctx.arc(-3, -3, 1.2, 0, Math.PI * 2);
        ctx.arc(5, -3, 1.2, 0, Math.PI * 2);
        ctx.fill();

        ctx.restore();
      }
    }

    function drawRewards() {
      for (const r of rewardDrops) {
        ctx.save();

        const pulse = Math.sin(Date.now() / 100) * 2;

        ctx.translate(r.x, r.y + pulse);
        ctx.rotate(Math.sin(r.spin) * 0.25);

        ctx.shadowColor = r.type === "FREEBET" ? "#ffe28a" : "#7ee7ff";
        ctx.shadowBlur = 22;

        const gradient = ctx.createRadialGradient(0, 0, 4, 0, 0, 20);

        if (r.type === "FREEBET") {
          gradient.addColorStop(0, "#fff3ba");
          gradient.addColorStop(1, "#ffb93d");
        } else {
          gradient.addColorStop(0, "#dff9ff");
          gradient.addColorStop(1, "#45aaff");
        }

        ctx.fillStyle = gradient;
        ctx.beginPath();
        ctx.arc(0, 0, r.r, 0, Math.PI * 2);
        ctx.fill();

        ctx.shadowBlur = 0;
        ctx.fillStyle = "#03101f";
        ctx.font = "900 11px Arial";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(r.type === "FREEBET" ? "FB" : "FS", 0, -2);

        ctx.font = "800 7px Arial";
        ctx.fillText(String(r.amount), 0, 8);

        ctx.restore();
      }
    }

    function drawParticles() {
      for (const p of particles) {
        ctx.save();
        ctx.globalAlpha = Math.max(0, p.life);
        ctx.fillStyle = p.color;
        ctx.shadowColor = p.color;
        ctx.shadowBlur = 10;
        ctx.beginPath();
        ctx.arc(p.x, p.y, 2.1, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }

    function drawCountdown() {
      ctx.save();

      ctx.fillStyle = "rgba(0, 0, 0, 0.58)";
      ctx.fillRect(0, 0, W, H);

      ctx.textAlign = "center";
      ctx.textBaseline = "middle";

      ctx.shadowColor = "#7ee7ff";
      ctx.shadowBlur = 25;
      ctx.fillStyle = "#ffffff";
      ctx.font = countdownText === "BAŞLA!" ? "900 48px Arial" : "900 82px Arial";
      ctx.fillText(countdownText, W / 2, H / 2 - 10);

      ctx.shadowBlur = 0;
      ctx.fillStyle = "#9ed7ff";
      ctx.font = "900 15px Arial";
      ctx.fillText("Hazır ol", W / 2, H / 2 + 55);

      ctx.restore();
    }

    function drawGameOver() {
      ctx.save();

      ctx.fillStyle = "rgba(0, 0, 0, 0.62)";
      ctx.fillRect(0, 0, W, H);

      ctx.fillStyle = "#ffffff";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.font = "900 31px Arial";
      ctx.fillText("OYUN BİTTİ", W / 2, H / 2 - 30);

      ctx.fillStyle = "#9ed7ff";
      ctx.font = "900 16px Arial";
      ctx.fillText("Skor: " + score + " | Ödül: " + rewardsCaught.length, W / 2, H / 2 + 8);

      ctx.restore();
    }

    function roundRect(x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
    }

    function setDirection(dir) {
      if (!player) return;
      player.nextDir = dir;
    }

    function recordEvent(type, payload) {
      if (!CONFIG.SHEETS_WEBAPP_URL) return;

      const data = {
        type,
        game: CONFIG.GAME_NAME,
        version: CONFIG.GAME_VERSION,
        createdAt: new Date().toISOString(),
        payload
      };

      try {
        fetch(CONFIG.SHEETS_WEBAPP_URL, {
          method: "POST",
          mode: "no-cors",
          headers: {
            "Content-Type": "text/plain;charset=utf-8"
          },
          body: JSON.stringify(data)
        }).catch(() => {});
      } catch (e) {}
    }

    startBtn.addEventListener("click", function(e) {
      e.preventDefault();
      startCountdown();
    });

    window.addEventListener("keydown", function(event) {
      if (event.code === "ArrowUp" || event.code === "KeyW") setDirection(DIRS.up);
      if (event.code === "ArrowDown" || event.code === "KeyS") setDirection(DIRS.down);
      if (event.code === "ArrowLeft" || event.code === "KeyA") setDirection(DIRS.left);
      if (event.code === "ArrowRight" || event.code === "KeyD") setDirection(DIRS.right);
    });

    document.getElementById("upBtn").addEventListener("pointerdown", e => {
      e.preventDefault();
      setDirection(DIRS.up);
    });

    document.getElementById("downBtn").addEventListener("pointerdown", e => {
      e.preventDefault();
      setDirection(DIRS.down);
    });

    document.getElementById("leftBtn").addEventListener("pointerdown", e => {
      e.preventDefault();
      setDirection(DIRS.left);
    });

    document.getElementById("rightBtn").addEventListener("pointerdown", e => {
      e.preventDefault();
      setDirection(DIRS.right);
    });

    canvas.addEventListener("pointerdown", function(event) {
      event.preventDefault();

      swipeActive = true;
      swipeStartX = event.clientX;
      swipeStartY = event.clientY;
    }, { passive: false });

    canvas.addEventListener("pointermove", function(event) {
      event.preventDefault();

      if (!swipeActive) return;

      const dx = event.clientX - swipeStartX;
      const dy = event.clientY - swipeStartY;

      if (Math.abs(dx) < 18 && Math.abs(dy) < 18) return;

      if (Math.abs(dx) > Math.abs(dy)) {
        setDirection(dx > 0 ? DIRS.right : DIRS.left);
      } else {
        setDirection(dy > 0 ? DIRS.down : DIRS.up);
      }

      swipeStartX = event.clientX;
      swipeStartY = event.clientY;
    }, { passive: false });

    canvas.addEventListener("pointerup", function(event) {
      event.preventDefault();
      swipeActive = false;
    }, { passive: false });

    canvas.addEventListener("pointercancel", function(event) {
      event.preventDefault();
      swipeActive = false;
    }, { passive: false });

    window.addEventListener("beforeunload", function() {
      stopMusic();
    });

    resetPellets();
    resetPositions();
    updateHud();
    requestAnimationFrame(loop);
  </script>
</body>
</html>
