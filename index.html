<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ustabet Invaders</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top, #123c78, #020611 70%);
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    .box {
      width: min(92%, 520px);
      border: 1px solid rgba(120, 200, 255, .45);
      border-radius: 24px;
      padding: 28px;
      background: rgba(0, 0, 0, .35);
      box-shadow: 0 0 40px rgba(0, 140, 255, .25);
    }

    h1 {
      margin: 0 0 10px;
      color: #7ee7ff;
      font-size: 34px;
      text-shadow: 0 0 18px rgba(126, 231, 255, .8);
    }

    p {
      color: #cfe8ff;
      font-size: 16px;
      line-height: 1.5;
    }

    .badge {
      display: inline-block;
      margin-top: 12px;
      padding: 10px 14px;
      border-radius: 999px;
      background: linear-gradient(135deg, #5aa9ff, #8eeaff);
      color: #03101f;
      font-weight: 900;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Ustabet Invaders</h1>
    <p>GitHub oyun sayfası hazır. Bir sonraki adımda bunu GitHub Pages ile internete açacağız.</p>
    <div class="badge">TEST SAYFASI ÇALIŞIYOR</div>
  </div>
</body>
</html>
